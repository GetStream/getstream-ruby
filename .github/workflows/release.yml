name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master

concurrency:
  group: release-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  prepare_release:
    name: Prepare release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release_meta.outputs.should_release }}
      bump: ${{ steps.release_meta.outputs.bump }}
      previous_version: ${{ steps.release_meta.outputs.previous_version }}
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      already_released: ${{ steps.already_released.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.0"

      - name: Install dependencies
        run: bundle install --jobs 4 --retry 3

      - name: Skip when PR is already released
        id: already_released
        run: |
          if git log --oneline --grep="(pr #${{ github.event.pull_request.number }})" -n 1 | grep -q "chore(release):"; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine and apply version bump
        id: release_meta
        if: steps.already_released.outputs.value != 'true'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          PR_BODY_FILE=$(mktemp)
          printf '%s' "$PR_BODY" > "$PR_BODY_FILE"
          ruby scripts/release/bump_version.rb \
            --title "$PR_TITLE" \
            --body-file "$PR_BODY_FILE" \
            --output "$GITHUB_OUTPUT"

      - name: Stop when PR does not require release
        if: steps.already_released.outputs.value == 'true' || steps.release_meta.outputs.should_release != 'true'
        run: |
          if [ "${{ steps.already_released.outputs.value }}" = "true" ]; then
            echo "PR #${{ github.event.pull_request.number }} is already released; skipping."
            exit 0
          fi
          echo "No release type found in PR title; skipping."
          exit 0

      - name: Commit version files
        if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/getstream_ruby/version.rb
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          git commit -m "chore(release): v${{ steps.release_meta.outputs.version }} (pr #${{ github.event.pull_request.number }})"
          git push origin "HEAD:${{ github.event.pull_request.base.ref }}"

      - name: Create release tag
        if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
        run: |
          git tag "${{ steps.release_meta.outputs.tag }}"
          git push origin "${{ steps.release_meta.outputs.tag }}"

      - name: Build gem
        if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
        run: |
          gem build getstream-ruby.gemspec --output "getstream-ruby-${{ steps.release_meta.outputs.version }}.gem"

      - name: Upload gem artifact
        if: steps.already_released.outputs.value != 'true' && steps.release_meta.outputs.should_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: getstream-ruby-gem-${{ steps.release_meta.outputs.version }}
          path: getstream-ruby-${{ steps.release_meta.outputs.version }}.gem
          if-no-files-found: error

  publish_release:
    name: Publish release
    needs: prepare_release
    if: needs.prepare_release.outputs.already_released != 'true' && needs.prepare_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.0"

      - name: Download gem artifact
        uses: actions/download-artifact@v4
        with:
          name: getstream-ruby-gem-${{ needs.prepare_release.outputs.version }}

      - name: Publish gem
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          if curl -s "https://rubygems.org/api/v1/versions/getstream-ruby.json" | jq -e '.[] | select(.number == env.VERSION)' >/dev/null; then
            echo "Gem version ${VERSION} already published; skipping."
            exit 0
          fi
          gem push "getstream-ruby-${VERSION}.gem" --key "$GEM_HOST_API_KEY"

      - name: Create release on GitHub
        env:
          TAG: ${{ needs.prepare_release.outputs.tag }}
          VERSION: ${{ needs.prepare_release.outputs.version }}
          BUMP: ${{ needs.prepare_release.outputs.bump }}
          PREVIOUS: ${{ needs.prepare_release.outputs.previous_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${TAG} already exists; skipping."
            exit 0
          fi
          RELEASE_NOTES="$(cat <<EOF
          Release v${VERSION}

          - Bump type: ${BUMP}
          - Previous: ${PREVIOUS}
          - Next: ${VERSION}
          EOF
          )"
          gh release create "${TAG}" \
            --title "Release v${VERSION}" \
            --notes "${RELEASE_NOTES}"